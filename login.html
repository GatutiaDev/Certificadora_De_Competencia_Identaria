<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:wght@400;700&display=swap" rel="stylesheet">
    <title>BGT - Login & Cadastro</title>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1><img class="logo" src="" alt=""></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="perguntas.html">Perguntas</a></li>
                    <li><a href="aulaextra.html">Aula Extra</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html">Login/Cadastro</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="login-container">
        <div class="auth-card" id="login-card">
            <h2>Entrar</h2>
            <form>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="senha" required>
                </div>
                <button type="submit" class="btn-auth">Acessar Conta</button>
            </form>
            <p>Não tem uma conta? <a href="#" onclick="toggleAuth()">Cadastre-se</a></p>
        </div>

        <div class="auth-card" id="register-card" style="display: none;">
            <h2>Criar Conta</h2>
            <form>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Seu nome" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Crie uma senha" required>
                </div>
                <button type="submit" class="btn-auth">Finalizar Cadastro</button>
            </form>
            <p>Já possui conta? <a href="#" onclick="toggleAuth()">Faça login</a></p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; Copyright BGT 2025.</p>
        </div>
    </footer>

    <script>
        function toggleAuth() {
            const loginCard = document.getElementById('login-card');
            const registerCard = document.getElementById('register-card');
            
            if (loginCard.style.display === 'none') {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
            } else {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
            }
        }

        // Script da Navbar que você já usa
        const navbar = document.querySelector(".navbar");
        window.addEventListener("scroll", () => {
            if (window.scrollY > 50) {
                navbar.classList.add("scrolled");
            } else {
                navbar.classList.remove("scrolled");
            }
        });
    </script>
</body>
</html>

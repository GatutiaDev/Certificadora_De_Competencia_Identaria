<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <title>Perguntas</title>
</head>
<body>
    
        <header class="navbar">
        <div class="container">
            <h1><img class="logo" src="" alt=""></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="perguntas.html">Perguntas</a></li>
                    <li><a href="aulaextra.html">Aula Extra</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html">Login/Cadastro</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <main class="container">
        <div class="topo-perguntas">
                <h2>Perguntas da Comunidade</h2>
                <p>Explore dúvidas e ajude outros alunos.</p>
            
            <button class="btn-pergunta" onclick="fazerPergunta()">Fazer Pergunta</button>
        </div>

        <section class="form-pergunta" id="novaPergunta">
            <h2>Nova pergunta</h2>
            <form id="perguntaForm">
                <div class="input-group">
                    <label for="perguntaTitulo">Titulo</label>
                    <input type="text" id="perguntaTitulo" placeholder="Ex: Como funciona a fotossintese?" required>
                </div>
                <div class="input-group">
                    <label for="perguntaDescricao">Descricao</label>
                    <textarea id="perguntaDescricao" placeholder="Descreva sua duvida" required></textarea>
                </div>
                <button class="btn-auth" type="submit">Enviar pergunta</button>
                <p class="mensagem-pergunta" id="perguntaMensagem"></p>
            </form>
        </section>

        <div class="perguntas-lista" id="perguntasLista">
            <p class="estado-perguntas">Carregando perguntas...</p>
        </div>
    </main>


    <footer>
        <div class="container">
            <p>&copy; Copyright BGT 2025.</p>
        </div>
    </footer>


    <script>        
        const navbar = document.querySelector(".navbar");

        window.addEventListener("scroll", () => {

        if (window.scrollY > 70) {
            navbar.classList.add("scrolled");
        } 
        else {
            navbar.classList.remove("scrolled");
        }

        });
    </script>
    <script src="js/api.js"></script>
    <script src="js/perguntas.js"></script>
</body>
</html>
